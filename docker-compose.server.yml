# VPS backend-only deploy
# Ishlatish:
#   cd /home/deploy/school-attendance-backend
#   docker compose -f docker-compose.server.yml up -d --build

version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: school_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: school_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - school_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.8'
        reservations:
          memory: 256M

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: school_redis
    restart: always
    command: redis-server --maxmemory 220mb --maxmemory-policy allkeys-lru
    networks:
      - school_net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 64M

  # ── MediaMTX (RTMP/RTSP → HLS) ─────────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: school_mediamtx
    restart: always
    ports:
      - "1935:1935"   # RTMP  — kamera shu portga push qiladi
      - "8554:8554"   # RTSP  — ixtiyoriy
      - "8888:8888"   # HLS   — brauzer shu portdan ko'radi
    environment:
      MTX_PROTOCOLS: tcp
      MTX_HLSSEGMENTCOUNT: "3"
      MTX_HLSSEGMENTDURATION: "1s"
      MTX_LOGLEVEL: warn
    networks:
      - school_net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

  # ── Backend (NestJS) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
    container_name: school_backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env.prod
    environment:
      DATABASE_URL_PROD: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/school_db?schema=public
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/school_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
      NODE_ENV: production
      TZ: Asia/Tashkent
      NODE_OPTIONS: --max-old-space-size=512
      MEDIAMTX_HLS_HOST: ${MEDIAMTX_HLS_HOST}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - school_net
    deploy:
      resources:
        limits:
          memory: 900M
          cpus: '1.5'
        reservations:
          memory: 300M

networks:
  school_net:
    driver: bridge

volumes:
  postgres_data:
